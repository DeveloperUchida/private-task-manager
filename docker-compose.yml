# docker-compose.yml
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./php:/var/www/html:ro
    depends_on:
      - go-auth
      - php-app
    networks:
      - internal

  go-auth:
    image: golang:1.23-alpine
    working_dir: /app
    volumes:
      - ./go-auth:/app
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - REDIRECT_URL=http://localhost/auth/callback
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_DSN=taskuser:${DB_PASSWORD}@tcp(mysql:3306)/taskdb
    command: go run .
    depends_on:
      - mysql
    networks:
      - internal

  php-app:
    build: ./php
    volumes:
      - ./php:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_NAME=taskdb
      - DB_USER=taskuser
      - DB_PASS=${DB_PASSWORD}
    depends_on:
      - mysql
    networks:
      - internal

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=taskdb
      - MYSQL_USER=taskuser
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal

volumes:
  mysql_data:


networks:
  internal:
    driver: bridge
